# Release: build signed .app (ad-hoc), zip, attach to GitHub Release when you push tag v*
name: Release

on:
  push:
    tags:
      - "v*"
  # Manual run: builds .app + zip and uploads workflow artifact only (no GitHub Release).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-macos:
    name: Package macOS app (${{ runner.arch }})
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Package .app (release + ad-hoc codesign)
        run: ./package_app.sh

      - name: Zip app bundle
        id: zip
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          ZIP_NAME="MarkdownViewer-${VERSION}-macos15-${{ runner.arch }}.zip"
          ditto -c -k --sequesterRsrc --keepParent MarkdownViewer.app "$ZIP_NAME"
          echo "zip_path=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          shasum -a 256 "$ZIP_NAME" | tee SHA256SUMS.txt

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: MarkdownViewer-macos15-${{ runner.arch }}
          path: |
            ${{ steps.zip.outputs.zip_path }}
            SHA256SUMS.txt

      - name: Create GitHub Release (tag pushes only)
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.zip.outputs.zip_path }}
            SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
