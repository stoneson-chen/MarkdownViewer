# Continuous integration: Swift 6.2 + macOS 15 (matches Package.swift platforms).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & test (macOS 15, Swift 6.2)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6.2 toolchain)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Swift 6.2 ships with Xcode 16.3+; pin 16.4 for reproducible CI on macOS 15 images.
          xcode-version: "16.4"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (release)
        run: swift build -c release --disable-sandbox

      - name: Test
        run: swift test --disable-sandbox
